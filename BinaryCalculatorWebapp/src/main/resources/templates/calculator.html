<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Binary Calculator</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <style>
        body { font-family: sans-serif; }
        .calculator-container {
            width: 600px;
            margin: 50px auto;
            border: 1px solid #000;
            padding: 10px;
        }
        .display-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .input-box {
            width: 40%;
            padding: 10px;
            font-size: 1.2em;
            text-align: right;
            border: 2px solid #000;
            border-radius: 5px;
        }
        .input-box:focus { background-color: #e0f7fa; outline: none; }
        .operator-box {
            width: 10%;
            font-size: 1.2em;
            text-align: center;
        }
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
        }
        .btn {
            padding: 15px;
            font-size: 1.5em;
            color: white;
            background-color: green;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover { background-color: darkgreen; }
        .btn-wide { grid-column: span 2; }
    </style>
    <script>
        // Track which input box was last clicked
        let activeInputId = 'operand1';

        function setActive(id) {
            activeInputId = id;
        }

        function addToInput(val) {
            let field = document.getElementById(activeInputId);
            field.value += val;
            field.focus(); // Keep focus on the box
        }

        function setOperator(op) {
            document.getElementById('operator').value = op;
            // Auto-switch to second box when operator is clicked
            activeInputId = 'operand2';
            document.getElementById('operand2').focus();
        }
        
        function clearFields() {
            document.getElementById('operand1').value = "";
            document.getElementById('operand2').value = "";
            activeInputId = 'operand1';
            document.getElementById('operand1').focus();
        }
    </script>
</head>
<body>
    <div class="calculator-container">
        <form action="/" method="post">
            <div class="display-row">
                <input type="text" id="operand1" name="operand1" class="input-box" 
                       th:value="${operand1}" onclick="setActive('operand1')" required autofocus />
                
                <select id="operator" name="operator" class="operator-box">
                    <option value="+">+</option>
                    <option value="*">*</option>
                    <option value="|">|</option>
                    <option value="&">&</option>
                </select>

                <input type="text" id="operand2" name="operand2" class="input-box" 
                       th:value="${operand2}" onclick="setActive('operand2')" required />
            </div>

            <div class="button-grid">
                <button type="button" class="btn" onclick="addToInput('0')">0</button>
                <button type="button" class="btn" onclick="addToInput('1')">1</button>
                <button type="button" class="btn" onclick="clearFields()">C</button>
                <button type="button" class="btn" onclick="clearFields()">CE</button>

                <button type="button" class="btn" onclick="setOperator('+')">+</button>
                <button type="button" class="btn" onclick="setOperator('*')">*</button>
                <div style="grid-column: span 2;"></div>

                <button type="button" class="btn" onclick="setOperator('|')">|</button>
                <button type="button" class="btn" onclick="setOperator('&')">&</button>
                <button type="submit" class="btn btn-wide">=</button>
            </div>
        </form>
    </div>
</body>
</html>
